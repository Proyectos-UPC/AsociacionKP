<div class="mcard">
  <div class="mcard-img">
    <span class="mcard-emoji">🐶</span>
    <span class="badge"
      [class.badge-buscado]="mascota.estado==='buscado'"
      [class.badge-encontrado]="mascota.estado==='encontrado'"
      [class.badge-aprobado]="mascota.estado==='aprobado'">
      {{ estadoLabel }}
    </span>
  </div>
  <div class="mcard-body">
    <h3 class="mcard-name">{{ mascota.nombre }}</h3>
    <div class="mcard-meta">
      <span>🦴 {{ mascota.raza }}</span>
      <span>📍 {{ mascota.distrito }}</span>
      <span>🗓 {{ mascota.fechaPerdida }}</span>
    </div>
    <p class="mcard-desc">{{ mascota.descripcion }}</p>
    <a [routerLink]="['/mascota', mascota.id]" class="btn btn-primary mcard-btn">Ver detalles →</a>
  </div>
</div>
