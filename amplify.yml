version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 24
        - nvm use 24
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/GRUPO4-TB1/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
